name: YouTube Multi Downloader

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'YouTube URLs (comma-separated OR one per line)'
        required: true
        type: string
        default: 'https://youtu.be/U2vRKl_gj78,https://youtu.be/Z1Aw6HpZjVo,https://youtu.be/qiNRKCxoDGk,https://youtu.be/SYxor82He8Q,https://youtu.be/ExlWOO8o2lc,https://youtu.be/SrX-JegN4jo,https://youtu.be/O_lWHq7aeuY'
      output_format:
        description: 'Output type'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'
      desired_quality:
        description: 'Quality (video: 144p|360p|480p|720p|1080p; audio: 64|128|192|320kbps)'
        required: false
        type: string
        default: '720p'
      max_part_mb:
        description: 'Max part size in MB (0 = no split)'
        required: false
        type: number
        default: 2000
      output_folder:
        description: 'Output folder'
        required: false
        type: string
        default: 'downloads'

jobs:
  download-multiple:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl jq python3

      - name: Download all videos
        run: |
          python3 << 'EOF'
          import os, sys, time, re, requests

          urls_text = """${{ github.event.inputs.video_urls }}"""
          fmt_raw = "${{ github.event.inputs.output_format }}"
          fmt = "mp3" if "mp3" in fmt_raw else "mp4"
          qual = "${{ github.event.inputs.desired_quality }}"
          out_dir = "${{ github.event.inputs.output_folder }}"

          # Parse URLs (supports both comma-separated AND newline-separated)
          urls = []
          # First, split by newlines
          for line in urls_text.strip().split('\n'):
              line = line.strip()
              if not line:
                  continue
              # Then, split each line by comma
              for part in line.split(','):
                  part = part.strip()
                  # Remove si parameter for cleaner URL
                  part = re.sub(r'[?&]si=[^&]*', '', part)
                  # Clean up any double ? or & at the end
                  part = re.sub(r'[?&]$', '', part)
                  if part and ('youtube.com' in part or 'youtu.be' in part):
                      urls.append(part)

          print(f"📋 Found {len(urls)} videos")
          print(f"🎯 Format: {fmt} | Quality: {qual}")
          print("=" * 60)

          os.makedirs(out_dir, exist_ok=True)

          session = requests.Session()
          session.headers.update({
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36",
              "Content-Type": "application/json",
              "Accept": "application/json"
          })
          
          # Initialize session
          try:
              session.get("https://media.ytmp3.gg/", timeout=10)
          except:
              pass

          success = 0
          failed = []

          for idx, url in enumerate(urls, 1):
              print(f"\n{'─' * 50}")
              print(f"📌 [{idx}/{len(urls)}] Processing...")
              
              try:
                  # Extract video ID
                  video_id = "unknown"
                  if 'youtu.be/' in url:
                      video_id = url.split('youtu.be/')[1].split('/')[0].split('?')[0].split('&')[0]
                  elif 'v=' in url:
                      video_id = url.split('v=')[1].split('&')[0]
                  elif '/shorts/' in url:
                      video_id = url.split('/shorts/')[1].split('?')[0]
                  
                  print(f"  🆔 ID: {video_id}")

                  # Request conversion
                  payload = {
                      "url": url,
                      "os": "linux",
                      "output": {
                          "type": "audio" if fmt == "mp3" else "video",
                          "format": fmt
                      }
                  }
                  if fmt == "mp3":
                      payload["audio"] = {"bitrate": qual}
                  else:
                      payload["output"]["quality"] = qual

                  resp = session.post(
                      "https://hub.ytconvert.org/api/download",
                      json=payload,
                      timeout=30
                  )
                  resp.raise_for_status()
                  data = resp.json()

                  status_url = data.get('statusUrl')
                  title = data.get('title', 'Untitled')
                  
                  if not status_url:
                      print(f"  ❌ No conversion URL")
                      failed.append(url)
                      continue

                  # Wait for completion
                  download_url = None
                  print(f"  ⏳ Converting", end="", flush=True)
                  for attempt in range(90):
                      time.sleep(2)
                      print(".", end="", flush=True)
                      try:
                          sr = session.get(status_url, timeout=15)
                          sd = sr.json()
                          if sd.get('status') == 'completed':
                              download_url = sd.get('downloadUrl')
                              print(" Done!")
                              break
                          elif sd.get('status') == 'failed':
                              print(" Failed!")
                              break
                      except:
                          continue

                  if not download_url:
                      print(f"\n  ❌ Conversion failed/timeout")
                      failed.append(url)
                      continue

                  # Build filename
                  clean_title = re.sub(r'[<>:"/\\|?*\']', '', title)
                  clean_title = re.sub(r'[^a-zA-Z0-9\-\s_]', '', clean_title)
                  clean_title = re.sub(r'\s+', '_', clean_title)[:70].strip('_')
                  filename = f"{clean_title}_{video_id}_{qual}.{fmt}"
                  filepath = os.path.join(out_dir, filename)

                  # Download
                  print(f"  📥 Downloading: {title[:80]}")
                  dl_resp = session.get(download_url, timeout=600)
                  dl_resp.raise_for_status()

                  with open(filepath, 'wb') as f:
                      f.write(dl_resp.content)

                  size_mb = os.path.getsize(filepath) / (1024 * 1024)
                  print(f"  ✅ Saved: {filename}")
                  print(f"  📦 Size: {size_mb:.1f} MB")
                  success += 1
                  
                  # Brief pause between downloads
                  time.sleep(1)

              except Exception as e:
                  print(f"  ❌ Error: {str(e)[:150]}")
                  failed.append(url)

          # Final summary
          print(f"\n{'=' * 60}")
          print(f"📊 FINAL RESULTS:")
          print(f"  ✅ Downloaded: {success}/{len(urls)}")
          print(f"  ❌ Failed: {len(failed)}/{len(urls)}")
          print(f"  📁 Location: {out_dir}/")
          
          # Save summary
          with open(os.path.join(out_dir, "download_summary.txt"), "w", encoding="utf-8") as f:
              f.write(f"Download Summary\n")
              f.write(f"{'=' * 50}\n")
              f.write(f"Date: {time.strftime('%Y-%m-%d %H:%M:%S')}\n")
              f.write(f"Format: {fmt} | Quality: {qual}\n")
              f.write(f"Total: {len(urls)} | Success: {success} | Failed: {len(failed)}\n")
              f.write(f"\nDownloaded:\n")
              for u in urls:
                  if u not in failed:
                      f.write(f"  ✅ {u}\n")
              if failed:
                  f.write(f"\nFailed:\n")
                  for u in failed:
                      f.write(f"  ❌ {u}\n")

          if failed:
              print(f"\n💀 Failed URLs:")
              for i, u in enumerate(failed, 1):
                  print(f"  {i}. {u}")
          
          sys.exit(0 if success > 0 else 1)
          EOF
        env:
          PYTHONUNBUFFERED: 1

      - name: Split large files
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          MAX_MB=${{ github.event.inputs.max_part_mb }}
          
          if [ "$MAX_MB" -gt 0 ]; then
            cd "$FOLDER"
            for f in *; do
              case "$f" in
                *.summary|download_summary.txt|*.part.*) continue ;;
              esac
              [ -f "$f" ] || continue
              
              SIZE_MB=$(du -m "$f" | cut -f1)
              if [ "$SIZE_MB" -gt "$MAX_MB" ]; then
                echo "📦 Splitting $f (${SIZE_MB}MB)"
                PART_DIR="${f}_parts"
                mkdir -p "$PART_DIR"
                split -b "${MAX_MB}M" -d "$f" "${PART_DIR}/${f}.part."
                echo "  ✅ Split into $(ls "$PART_DIR" | wc -l) parts"
                rm "$f"
              fi
            done
            cd ../..
          fi

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILE_COUNT=$(find "$FOLDER" -type f ! -name 'download_summary.txt' | wc -l)
          
          git add "$FOLDER/"
          git commit -m "📥 Downloaded $FILE_COUNT file(s) [skip ci]" || echo "Nothing to commit"
          git push

      - name: Show final stats
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║     ✅ DOWNLOAD COMPLETE!           ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ 📁 Folder: $FOLDER"
          echo "║ 📊 Files : $(find $FOLDER -type f ! -name 'download_summary.txt' | wc -l)"
          echo "║ 💾 Size  : $(du -sh $FOLDER | cut -f1)"
          echo "╚══════════════════════════════════════╝"
