name: دانلودر یوتیوب پیشرفته

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🎥 لینک‌های یوتیوب (با کاما جدا کنید)'
        required: true
        type: string
      output_format:
        description: '📦 نوع خروجی'
        required: true
        type: choice
        options:
          - '🎬 ویدیو (MP4)'
          - '🎵 فقط صدا (MP3)'
          - '📹 بهترین کیفیت خودکار'
        default: '🎬 ویدیو (MP4)'
      quality:
        description: '⚡ کیفیت ویدیو (144/240/360/480/720/1080/1440/2160)'
        required: false
        type: string
        default: '720'
      create_zip:
        description: '📦 همه فایل‌ها را در یک فایل ZIP قرار بده'
        required: false
        type: boolean
        default: true
      split_size:
        description: '📊 حداکثر حجم هر بخش به مگابایت (0 = تقسیم نشود)'
        required: false
        type: number
        default: 0

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🛠️ نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg pv zip
          pip3 install yt-dlp

      - name: 🎯 دانلود هوشمند چندگانه
        id: download
        env:
          URLS: ${{ github.event.inputs.video_urls }}
          QUALITY: ${{ github.event.inputs.quality }}
          FORMAT_TYPE: ${{ github.event.inputs.output_format }}
        run: |
          set -e
          
          # پوشه موقت برای دانلود
          TEMP_DIR="downloads/temp_$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$TEMP_DIR"
          
          echo "📁 Temp directory: $TEMP_DIR"
          
          # 🎯 تعیین فرمت خروجی
          FORMAT_STRING=""
          POST_PROCESSOR=""
          
          case "$FORMAT_TYPE" in
            *"فقط صدا"*|*"MP3"*)
              echo "🎵 حالت: فقط صدا"
              FORMAT_STRING="bestaudio/best"
              POST_PROCESSOR="--extract-audio --audio-format mp3 --audio-quality 0"
              ;;
            *"بهترین کیفیت"*)
              echo "📹 حالت: بهترین کیفیت خودکار"
              FORMAT_STRING="bestvideo+bestaudio/best"
              POST_PROCESSOR="--merge-output-format mp4"
              ;;
            *)
              if [[ "$QUALITY" =~ ^[0-9]+$ ]] && [ "$QUALITY" -ge 144 ]; then
                echo "🎬 حالت: ویدیو با کیفیت ${QUALITY}p"
                FORMAT_STRING="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]/best"
              else
                echo "⚠️ کیفیت نامعتبر - استفاده از بهترین کیفیت"
                FORMAT_STRING="bestvideo+bestaudio/best"
              fi
              POST_PROCESSOR="--merge-output-format mp4"
              ;;
          esac
          
          echo "🔍 فرمت نهایی: $FORMAT_STRING"
          
          COMMON_OPTS="--no-playlist \
            --retries 10 \
            --fragment-retries 10 \
            --concurrent-fragments 8 \
            --sleep-requests 1 \
            --sleep-interval 1 \
            --max-sleep-interval 5 \
            --user-agent 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36' \
            --extractor-retries 5 \
            --socket-timeout 30 \
            --no-warnings"
          
          # 📥 پردازش لینک‌ها
          IFS=',' read -ra URL_ARRAY <<< "$URLS"
          TOTAL_URLS=${#URL_ARRAY[@]}
          CURRENT=0
          
          echo "📋 تعداد لینک‌ها: $TOTAL_URLS"
          
          LOG_FILE="$TEMP_DIR/download_log.txt"
          echo "📥 گزارش دانلود - $(date '+%Y-%m-%d %H:%M:%S')" > "$LOG_FILE"
          
          for url in "${URL_ARRAY[@]}"; do
            CLEAN_URL=$(echo "$url" | sed 's/[[:space:]]*//g' | sed 's/\?si=.*$//')
            
            if [ -z "$CLEAN_URL" ]; then
              continue
            fi
            
            CURRENT=$((CURRENT + 1))
            
            echo ""
            echo "═══════════════════════════════════════"
            echo "📥 دانلود $CURRENT از $TOTAL_URLS"
            echo "🔗 $CLEAN_URL"
            
            echo "📥 شماره $CURRENT - $CLEAN_URL" >> "$LOG_FILE"
            
            if yt-dlp \
              --format "$FORMAT_STRING" \
              $POST_PROCESSOR \
              --output "$TEMP_DIR/%(title).150s [%(id)s].%(ext)s" \
              $COMMON_OPTS \
              "$CLEAN_URL" 2>&1 | tee -a "$LOG_FILE"; then
              echo "✅ دانلود $CURRENT موفق" >> "$LOG_FILE"
            else
              echo "❌ خطا در دانلود $CURRENT" >> "$LOG_FILE"
            fi
            
            echo "" >> "$LOG_FILE"
            sleep 2
          done
          
          echo ""
          echo "✅ دانلود همه لینک‌ها به پایان رسید"
          
          SUCCESS_COUNT=$(find "$TEMP_DIR" -type f \( -name "*.mp4" -o -name "*.mp3" -o -name "*.mkv" -o -name "*.webm" \) | wc -l)
          
          echo "📋 فایل‌های دانلود شده:"
          ls -lah "$TEMP_DIR"
          
          echo "temp_dir=$TEMP_DIR" >> $GITHUB_OUTPUT
          echo "success_count=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL_URLS" >> $GITHUB_OUTPUT

      - name: 📦 زیپ و انتقال به پوشه نهایی
        if: ${{ github.event.inputs.create_zip == 'true' }}
        run: |
          TEMP_DIR="${{ steps.download.outputs.temp_dir }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          # پوشه مقصد برای ZIP
          ZIP_FOLDER="downloads/zips/${TIMESTAMP}"
          mkdir -p "$ZIP_FOLDER"
          
          ZIP_NAME="youtube_downloads_${TIMESTAMP}.zip"
          ZIP_PATH="$ZIP_FOLDER/$ZIP_NAME"
          
          cd "$TEMP_DIR"
          
          echo "📦 در حال ایجاد فایل ZIP..."
          
          zip -r "$ZIP_NAME" . -x "*.part" "*.ytdl" 2>/dev/null || true
          
          # انتقال به پوشه مقصد
          mv "$ZIP_NAME" "../zips/${TIMESTAMP}/"
          
          ZIP_SIZE=$(du -h "$ZIP_PATH" | cut -f1)
          echo "✅ فایل ZIP ایجاد شد: downloads/zips/${TIMESTAMP}/$ZIP_NAME ($ZIP_SIZE)"
          
          # کپی فایل‌های اطلاعات هم به پوشه ZIP
          cp download_log.txt "../zips/${TIMESTAMP}/" 2>/dev/null || true
          
          # ایجاد فایل اطلاعات در پوشه ZIP
          cat > "../zips/${TIMESTAMP}/INFO.txt" << EOF
          📥 دانلود گروهی
          📅 تاریخ: $(date '+%Y-%m-%d %H:%M:%S')
          📊 تعداد فایل: ${{ steps.download.outputs.success_count }}
          📦 نوع: ${{ github.event.inputs.output_format }}
          ⚡ کیفیت: ${{ github.event.inputs.quality }}
          EOF
          
          echo "zip_folder=zips/${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: ✂️ تقسیم ZIP اگر لازم بود
        if: ${{ github.event.inputs.split_size > 0 && github.event.inputs.create_zip == 'true' }}
        run: |
          ZIP_FOLDER="downloads/${{ steps.download.outputs.zip_folder }}"
          SPLIT_SIZE=${{ github.event.inputs.split_size }}
          
          cd "$ZIP_FOLDER"
          
          for file in *.zip; do
            if [ -f "$file" ]; then
              SIZE_MB=$(du -m "$file" | cut -f1)
              if [ $SIZE_MB -gt $SPLIT_SIZE ]; then
                echo "✂️ در حال تقسیم $file ($SIZE_MB MB)..."
                split -b ${SPLIT_SIZE}M -d "$file" "${file}.part"
                rm "$file"
                
                cat > "reassemble.sh" << EOF
          #!/bin/bash
          cat ${file}.part* > "${file}"
          echo "✅ فایل ترکیب شد: ${file}"
          rm ${file}.part*
          EOF
                chmod +x "reassemble.sh"
                echo "✅ فایل تقسیم شد ($(ls ${file}.part* | wc -l) بخش)"
              fi
            fi
          done

      - name: 🧹 پاکسازی پوشه موقت
        if: always()
        run: |
          TEMP_DIR="${{ steps.download.outputs.temp_dir }}"
          if [ -d "$TEMP_DIR" ]; then
            rm -rf "$TEMP_DIR"
            echo "🧹 پوشه موقت پاک شد"
          fi

      - name: 💾 ذخیره در پروژه
        run: |
          set -e
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git pull --rebase
          
          # فقط پوشه zips رو اضافه کن
          git add downloads/zips/
          
          COMMIT_MSG="📦 ZIP جدید - $(date '+%Y-%m-%d %H:%M') [skip ci]"
          if git diff --cached --quiet; then
            echo "⏭️ چیزی برای commit وجود ندارد"
          else
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ فایل‌های ZIP در پروژه ذخیره شدند"
          fi

      - name: ✅ گزارش نهایی
        run: |
          echo "
          ╔══════════════════════════════════════╗
          ║   ✅ دانلود و زیپ با موفقیت انجام شد ║
          ╠══════════════════════════════════════╣
          ║ 📁 ZIP در: downloads/${{ steps.download.outputs.zip_folder }}/
          ║ 📊 فایل‌ها: ${{ steps.download.outputs.success_count }} عدد
          ╚══════════════════════════════════════╝
          "
          
          echo "🔗 مسیر در پروژه: ${{ github.server_url }}/${{ github.repository }}/tree/main/downloads/${{ steps.download.outputs.zip_folder }}"
