name: دانلودر یوتیوب پیشرفته

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🎥 لینک‌های یوتیوب (با کاما جدا کنید)'
        required: true
        type: string
      output_format:
        description: '📦 نوع خروجی'
        required: true
        type: choice
        options:
          - '🎬 ویدیو (MP4)'
          - '🎵 فقط صدا (MP3)'
          - '📹 بهترین کیفیت خودکار'
        default: '🎬 ویدیو (MP4)'
      quality:
        description: '⚡ کیفیت ویدیو (144/240/360/480/720/1080/1440/2160)'
        required: false
        type: string
        default: '720'
      create_zip:
        description: '📦 همه فایل‌ها را در یک فایل ZIP قرار بده'
        required: false
        type: boolean
        default: true
      split_size:
        description: '📊 حداکثر حجم هر بخش به مگابایت (0 = تقسیم نشود)'
        required: false
        type: number
        default: 0
      embed_metadata:
        description: '🏷️ افزودن متادیتا و تصویر به فایل'
        required: false
        type: boolean
        default: true

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🛠️ نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg pv zip
          pip3 install yt-dlp

      - name: 🎯 دانلود هوشمند چندگانه
        id: download
        env:
          URLS: ${{ github.event.inputs.video_urls }}
          QUALITY: ${{ github.event.inputs.quality }}
          FORMAT_TYPE: ${{ github.event.inputs.output_format }}
          EMBED_DATA: ${{ github.event.inputs.embed_metadata }}
          CREATE_ZIP: ${{ github.event.inputs.create_zip }}
        run: |
          set -e
          
          # ایجاد پوشه با timestamp
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT_DIR="downloads/${TIMESTAMP}"
          mkdir -p "$OUTPUT_DIR"
          
          echo "📁 Output directory: $OUTPUT_DIR"
          echo "🎯 Format type: $FORMAT_TYPE"
          echo "⚡ Requested quality: $QUALITY"
          echo "📦 Create ZIP: $CREATE_ZIP"
          
          # 🎯 تعیین فرمت خروجی
          FORMAT_STRING=""
          POST_PROCESSOR=""
          
          case "$FORMAT_TYPE" in
            *"فقط صدا"*|*"MP3"*)
              echo "🎵 حالت: فقط صدا"
              FORMAT_STRING="bestaudio/best"
              POST_PROCESSOR="--extract-audio --audio-format mp3 --audio-quality 0"
              OUTPUT_EXT="mp3"
              ;;
            *"بهترین کیفیت"*)
              echo "📹 حالت: بهترین کیفیت خودکار"
              FORMAT_STRING="bestvideo+bestaudio/best"
              POST_PROCESSOR="--merge-output-format mp4"
              OUTPUT_EXT="mp4"
              ;;
            *)
              # اعتبارسنجی کیفیت
              if [[ "$QUALITY" =~ ^[0-9]+$ ]] && [ "$QUALITY" -ge 144 ]; then
                echo "🎬 حالت: ویدیو با کیفیت ${QUALITY}p"
                FORMAT_STRING="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]/best"
              else
                echo "⚠️ کیفیت نامعتبر - استفاده از بهترین کیفیت"
                FORMAT_STRING="bestvideo+bestaudio/best"
              fi
              POST_PROCESSOR="--merge-output-format mp4"
              OUTPUT_EXT="mp4"
              ;;
          esac
          
          echo "🔍 فرمت نهایی: $FORMAT_STRING"
          
          # آپشن‌های مشترک
          COMMON_OPTS="--no-playlist \
            --retries 10 \
            --fragment-retries 10 \
            --concurrent-fragments 8 \
            --sleep-requests 1 \
            --sleep-interval 1 \
            --max-sleep-interval 5 \
            --user-agent 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36' \
            --extractor-retries 5 \
            --socket-timeout 30 \
            --no-warnings"
          
          # آپشن‌های متادیتا
          METADATA_OPTS=""
          if [ "$EMBED_DATA" = "true" ]; then
            METADATA_OPTS="--write-info-json \
              --write-thumbnail \
              --embed-metadata \
              --embed-thumbnail"
          fi
          
          # 📥 پردازش لینک‌ها
          IFS=',' read -ra URL_ARRAY <<< "$URLS"
          TOTAL_URLS=${#URL_ARRAY[@]}
          CURRENT=0
          
          echo "📋 تعداد لینک‌ها: $TOTAL_URLS"
          echo "🔗 لینک‌ها:"
          for url in "${URL_ARRAY[@]}"; do
            echo "  - $url"
          done
          
          # فایل لاگ برای اطلاعات
          LOG_FILE="$OUTPUT_DIR/download_log.txt"
          echo "📥 گزارش دانلود - $(date '+%Y-%m-%d %H:%M:%S')" > "$LOG_FILE"
          echo "═══════════════════════════════" >> "$LOG_FILE"
          echo "" >> "$LOG_FILE"
          
          # دانلود هر لینک
          for url in "${URL_ARRAY[@]}"; do
            # پاکسازی URL
            CLEAN_URL=$(echo "$url" | sed 's/[[:space:]]*//g' | sed 's/\?si=.*$//')
            
            if [ -z "$CLEAN_URL" ]; then
              continue
            fi
            
            CURRENT=$((CURRENT + 1))
            
            echo ""
            echo "═══════════════════════════════════════"
            echo "📥 دانلود $CURRENT از $TOTAL_URLS"
            echo "🔗 $CLEAN_URL"
            echo "═══════════════════════════════════════"
            
            echo "📥 شماره $CURRENT - $CLEAN_URL" >> "$LOG_FILE"
            
            # دانلود
            if yt-dlp \
              --format "$FORMAT_STRING" \
              $POST_PROCESSOR \
              --output "$OUTPUT_DIR/%(title).150s [%(id)s].%(ext)s" \
              $COMMON_OPTS \
              $METADATA_OPTS \
              "$CLEAN_URL" 2>&1 | tee -a "$LOG_FILE"; then
              
              echo "✅ دانلود $CURRENT موفق" >> "$LOG_FILE"
              echo "✅ دانلود $CURRENT موفق"
            else
              echo "❌ خطا در دانلود $CURRENT" >> "$LOG_FILE"
              echo "❌ خطا در دانلود $CURRENT - ادامه به لینک بعدی..."
            fi
            
            echo "" >> "$LOG_FILE"
            
            # وقفه کوتاه بین دانلودها
            sleep 2
          done
          
          echo ""
          echo "═══════════════════════════════════"
          echo "✅ دانلود همه لینک‌ها به پایان رسید"
          
          # لیست فایل‌های دانلود شده
          echo "" >> "$LOG_FILE"
          echo "📋 فایل‌های نهایی:" >> "$LOG_FILE"
          echo "═══════════════════════════════════" >> "$LOG_FILE"
          ls -lah "$OUTPUT_DIR" | grep -v "^d" | grep -v "^total" >> "$LOG_FILE"
          
          echo "📋 فایل‌های دانلود شده:"
          ls -lah "$OUTPUT_DIR"/*.{mp4,mp3,mkv,webm} 2>/dev/null || echo "  (در حال بررسی...)"
          
          # شمارش فایل‌های موفق
          SUCCESS_COUNT=$(find "$OUTPUT_DIR" -type f \( -name "*.mp4" -o -name "*.mp3" -o -name "*.mkv" -o -name "*.webm" \) | wc -l)
          echo "" >> "$LOG_FILE"
          echo "📊 تعداد فایل‌های موفق: $SUCCESS_COUNT از $TOTAL_URLS" >> "$LOG_FILE"
          
          # ذخیره مسیر برای مراحل بعد
          echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT
          echo "success_count=$SUCCESS_COUNT" >> $GITHUB_OUTPUT

      - name: 📦 ایجاد فایل ZIP
        if: ${{ github.event.inputs.create_zip == 'true' }}
        run: |
          OUTPUT_DIR="${{ steps.download.outputs.output_dir }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ZIP_NAME="youtube_downloads_${TIMESTAMP}.zip"
          ZIP_PATH="$OUTPUT_DIR/$ZIP_NAME"
          
          cd "$OUTPUT_DIR"
          
          echo "📦 در حال ایجاد فایل ZIP..."
          
          # لیست فایل‌هایی که قراره زیپ بشن
          echo "📋 فایل‌های داخل ZIP:"
          find . -type f \( -name "*.mp4" -o -name "*.mp3" -o -name "*.mkv" -o -name "*.webm" -o -name "*.json" -o -name "*.jpg" -o -name "*.png" \) -exec basename {} \; | head -20
          
          # ایجاد ZIP
          zip -r -q "$ZIP_NAME" \
            *.mp4 *.mp3 *.mkv *.webm \
            *.json *.jpg *.png \
            download_log.txt \
            2>/dev/null || true
          
          ZIP_SIZE=$(du -h "$ZIP_NAME" | cut -f1)
          echo ""
          echo "✅ فایل ZIP ایجاد شد: $ZIP_NAME ($ZIP_SIZE)"
          
          # محاسبه تعداد فایل‌های داخل ZIP
          FILES_IN_ZIP=$(unzip -l "$ZIP_NAME" | tail -1 | awk '{print $2}')
          echo "📊 تعداد فایل‌های داخل ZIP: $FILES_IN_ZIP"
          
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "zip_path=$ZIP_PATH" >> $GITHUB_OUTPUT

      - name: ✂️ تقسیم فایل‌های حجیم
        if: ${{ github.event.inputs.split_size > 0 }}
        run: |
          OUTPUT_DIR="${{ steps.download.outputs.output_dir }}"
          SPLIT_SIZE=${{ github.event.inputs.split_size }}
          cd "$OUTPUT_DIR"
          
          echo "✂️ بررسی فایل‌ها برای تقسیم (حداکثر ${SPLIT_SIZE}MB)..."
          
          for file in *.{mp4,mp3,mkv,webm,zip}; do
            if [ -f "$file" ]; then
              SIZE_MB=$(du -m "$file" | cut -f1)
              echo "  📦 $file: ${SIZE_MB}MB"
              
              if [ $SIZE_MB -gt $SPLIT_SIZE ]; then
                echo "    ✂️ در حال تقسیم..."
                split -b ${SPLIT_SIZE}M -d "$file" "${file}.part"
                rm "$file"
                
                # ساخت اسکریپت ترکیب مجدد
                BASENAME=$(basename "$file")
                cat > "reassemble_${BASENAME}.sh" << EOF
          #!/bin/bash
          # اسکریپت ترکیب فایل‌های تقسیم شده
          cat ${BASENAME}.part* > "${BASENAME}"
          echo "✅ فایل ترکیب شد: ${BASENAME}"
          # حذف بخش‌ها بعد از ترکیب موفق
          read -p "🗑️ حذف فایل‌های بخش؟ (y/n) " -n 1 -r
          echo
          if [[ \$REPLY =~ ^[Yy]$ ]]; then
              rm ${BASENAME}.part*
              echo "🗑️ فایل‌های بخش حذف شدند"
          fi
          EOF
                chmod +x "reassemble_${BASENAME}.sh"
                echo "    ✅ فایل تقسیم شد ($(ls ${BASENAME}.part* | wc -l) بخش)"
              fi
            fi
          done

      - name: 🔐 ایجاد چکسام
        run: |
          OUTPUT_DIR="${{ steps.download.outputs.output_dir }}"
          cd "$OUTPUT_DIR"
          
          echo "🔐 محاسبه چکسام‌ها..."
          
          # ایجاد فایل‌های چکسام برای همه فایل‌ها
          md5sum *.{mp4,mp3,mkv,webm,zip} *.part* 2>/dev/null > checksums.md5 || true
          sha256sum *.{mp4,mp3,mkv,webm,zip} *.part* 2>/dev/null > checksums.sha256 || true
          
          echo "✅ چکسام‌ها ایجاد شدند"
          
          # نمایش خلاصه
          echo "📋 MD5 checksums:"
          cat checksums.md5 2>/dev/null || echo "  (بدون چکسام)"

      - name: 📊 ایجاد فایل اطلاعات
        run: |
          OUTPUT_DIR="${{ steps.download.outputs.output_dir }}"
          SUCCESS_COUNT="${{ steps.download.outputs.success_count }}"
          
          cat > "$OUTPUT_DIR/INFO.txt" << EOF
          ╔══════════════════════════════════╗
          ║     📥 اطلاعات دانلود گروهی     ║
          ╠══════════════════════════════════╣
          📅 تاریخ: $(date '+%Y-%m-%d %H:%M:%S')
          📦 نوع: ${{ github.event.inputs.output_format }}
          ⚡ کیفیت: ${{ github.event.inputs.quality }}
          📊 تعداد موفق: ${SUCCESS_COUNT}
          🔧 ابزار: yt-dlp + ffmpeg
          💻 سیستم: GitHub Actions
          ✅ وضعیت: کامل شده
          
          📋 لینک‌های دانلود شده:
          EOF
          
          # اضافه کردن لینک‌ها
          IFS=',' read -ra URL_ARRAY <<< "${{ github.event.inputs.video_urls }}"
          for url in "${URL_ARRAY[@]}"; do
            echo "  • $(echo "$url" | sed 's/[[:space:]]*//g')" >> "$OUTPUT_DIR/INFO.txt"
          done
          
          # اضافه کردن اطلاعات ZIP
          if [ "${{ github.event.inputs.create_zip }}" = "true" ] && [ -n "${{ steps.download.outputs.zip_name }}" ]; then
            echo "" >> "$OUTPUT_DIR/INFO.txt"
            echo "📦 فایل ZIP: ${{ steps.download.outputs.zip_name }}" >> "$OUTPUT_DIR/INFO.txt"
          fi
          
          # محاسبه حجم کل
          TOTAL_SIZE=$(du -sh "$OUTPUT_DIR" | cut -f1)
          echo "💾 حجم کل: $TOTAL_SIZE" >> "$OUTPUT_DIR/INFO.txt"

      - name: 📦 ذخیره در مخزن
        run: |
          set -e
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          OUTPUT_DIR="${{ steps.download.outputs.output_dir }}"
          
          echo "💾 آماده‌سازی برای commit..."
          
          # اضافه کردن فایل‌های غیرحجیم
          git add "$OUTPUT_DIR/INFO.txt"
          git add "$OUTPUT_DIR/download_log.txt"
          git add "$OUTPUT_DIR/checksums."*
          git add "$OUTPUT_DIR/"*.json 2>/dev/null || true
          git add "$OUTPUT_DIR/"*.jpg 2>/dev/null || true
          git add "$OUTPUT_DIR/"*.png 2>/dev/null || true
          git add "$OUTPUT_DIR/"*.sh 2>/dev/null || true
          
          # فایل‌های کوچک (<100MB) هم اضافه شوند
          find "$OUTPUT_DIR" -type f -size -100M \( -name "*.mp4" -o -name "*.mp3" -o -name "*.mkv" -o -name "*.zip" \) -exec git add {} \; 2>/dev/null || true
          
          # commit
          COMMIT_MSG="📥 دانلود گروهی - $(date '+%Y-%m-%d %H:%M') [skip ci]"
          if git diff --cached --quiet; then
            echo "⏭️ فایل‌های بزرگ در Releases ذخیره می‌شوند"
          else
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ فایل‌های کوچک در مخزن ذخیره شدند"
          fi

      - name: 📤 آپلود به Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_id }}-${{ github.run_attempt }}
          name: '📥 دانلود گروهی شماره ${{ github.run_number }}'
          body_path: '${{ steps.download.outputs.output_dir }}/INFO.txt'
          files: |
            ${{ steps.download.outputs.output_dir }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ گزارش نهایی
        run: |
          OUTPUT_DIR="${{ steps.download.outputs.output_dir }}"
          SUCCESS_COUNT="${{ steps.download.outputs.success_count }}"
          
          echo "
          ╔══════════════════════════════════════╗
          ║   ✅ دانلود گروهی با موفقیت انجام شد ║
          ╠══════════════════════════════════════╣
          ║ 📁 مسیر: $OUTPUT_DIR
          ║ 📊 تعداد فایل‌های موفق: $SUCCESS_COUNT
          ║ 📦 نوع: ${{ github.event.inputs.output_format }}
          ╚══════════════════════════════════════╝
          "
          
          if [ "${{ github.event.inputs.create_zip }}" = "true" ]; then
            echo "📦 فایل ZIP در Releases قابل دانلود است"
          fi
          
          echo ""
          echo "📋 لینک Releases: ${{ github.server_url }}/${{ github.repository }}/releases/tag/download-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: 🧹 پاکسازی فایل‌های موقت
        if: always()
        run: |
          OUTPUT_DIR="${{ steps.download.outputs.output_dir }}"
          if [ -d "$OUTPUT_DIR" ]; then
            find "$OUTPUT_DIR" -name "*.part" -delete 2>/dev/null || true
            find "$OUTPUT_DIR" -name "*.ytdl" -delete 2>/dev/null || true
            echo "🧹 پاکسازی انجام شد"
          fi
