name: YouTube Multi Downloader

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'YouTube URLs (one per line)'
        required: true
        type: string
        default: |
          https://youtu.be/U2vRKl_gj78
          https://youtu.be/Z1Aw6HpZjVo
          https://youtu.be/qiNRKCxoDGk
          https://youtu.be/SYxor82He8Q
          https://youtu.be/ExlWOO8o2lc
          https://youtu.be/SrX-JegN4jo
          https://youtu.be/O_lWHq7aeuY
      
      output_format:
        description: 'Output type'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'
      
      desired_quality:
        description: 'Quality preset (video: 144p|360p|480p|720p|1080p; audio: 64|128|192|320kbps)'
        required: false
        type: string
        default: '720p'
      
      max_part_mb:
        description: 'Maximum part size in MB (0 = do not split)'
        required: false
        type: number
        default: 90
      
      output_folder:
        description: 'Folder to store downloaded files (relative to repo root)'
        required: false
        type: string
        default: 'downloads'

jobs:
  download-multiple:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl jq python3

      - name: Download all videos
        id: download
        run: |
          python3 << 'EOF'
          import os, sys, time, re, requests, urllib.parse

          # Get inputs
          urls_text = """${{ github.event.inputs.video_urls }}"""
          fmt = "${{ github.event.inputs.output_format }}"
          if "mp3" in fmt:
              fmt = "mp3"
          else:
              fmt = "mp4"
          
          qual = "${{ github.event.inputs.desired_quality }}"
          out_dir = "${{ github.event.inputs.output_folder }}"
          
          # Parse URLs (one per line, remove empty lines and spaces)
          urls = []
          for line in urls_text.strip().split('\n'):
              line = line.strip()
              if line and ('youtube.com' in line or 'youtu.be' in line):
                  urls.append(line)
          
          print(f"📋 Found {len(urls)} videos to download")
          print(f"🎯 Format: {fmt} | Quality: {qual}")
          print("-" * 50)
          
          # Create output folder
          os.makedirs(out_dir, exist_ok=True)
          
          # Download session
          session = requests.Session()
          session.headers.update({
              "User-Agent": "Mozilla/5.0",
              "Content-Type": "application/json"
          })
          
          # Initialize session
          session.get("https://media.ytmp3.gg/")
          
          downloaded = []
          failed = []
          
          for idx, url in enumerate(urls, 1):
              print(f"\n[{idx}/{len(urls)}] Processing: {url}")
              
              try:
                  # Extract video ID
                  video_id = None
                  if 'youtu.be/' in url:
                      video_id = url.split('youtu.be/')[1].split('?')[0]
                  elif 'v=' in url:
                      video_id = url.split('v=')[1].split('&')[0]
                  
                  if not video_id:
                      print(f"  ❌ Could not extract video ID")
                      failed.append(url)
                      continue
                  
                  # Build request
                  payload = {
                      "url": url,
                      "os": "linux",
                      "output": {
                          "type": "audio" if fmt == "mp3" else "video",
                          "format": fmt
                      }
                  }
                  
                  if fmt == "mp3":
                      payload["audio"] = {"bitrate": qual}
                  else:
                      payload["output"]["quality"] = qual
                  
                  # Submit conversion
                  resp = session.post(
                      "https://hub.ytconvert.org/api/download",
                      json=payload,
                      timeout=30
                  )
                  resp.raise_for_status()
                  data = resp.json()
                  
                  status_url = data.get('statusUrl')
                  title = data.get('title', 'unknown')
                  
                  if not status_url:
                      print(f"  ❌ No status URL returned")
                      failed.append(url)
                      continue
                  
                  # Wait for completion
                  download_url = None
                  for attempt in range(90):
                      time.sleep(2)
                      sr = session.get(status_url, timeout=15)
                      sd = sr.json()
                      
                      if sd.get('status') == 'completed':
                          download_url = sd.get('downloadUrl')
                          break
                      elif sd.get('status') == 'failed':
                          print(f"  ❌ Conversion failed")
                          break
                  
                  if not download_url:
                      print(f"  ❌ Timeout or failed")
                      failed.append(url)
                      continue
                  
                  # Prepare filename
                  clean_title = re.sub(r'[^a-zA-Z0-9\-_]', '_', title.replace(' ', '_'))[:80]
                  filename = f"{clean_title}_{video_id}_{qual}.{fmt}"
                  filepath = os.path.join(out_dir, filename)
                  
                  # Download file
                  print(f"  📥 Downloading: {title[:60]}...")
                  dl_resp = session.get(download_url, timeout=300)
                  dl_resp.raise_for_status()
                  
                  with open(filepath, 'wb') as f:
                      f.write(dl_resp.content)
                  
                  file_size = os.path.getsize(filepath) / (1024 * 1024)
                  print(f"  ✅ Downloaded: {filename} ({file_size:.1f} MB)")
                  downloaded.append(filepath)
                  
                  # Small delay between downloads
                  time.sleep(1)
                  
              except Exception as e:
                  print(f"  ❌ Error: {str(e)}")
                  failed.append(url)
          
          # Summary
          print("\n" + "=" * 50)
          print(f"📊 DOWNLOAD SUMMARY:")
          print(f"  ✅ Success: {len(downloaded)}/{len(urls)}")
          print(f"  ❌ Failed: {len(failed)}/{len(urls)}")
          
          # Save info for next steps
          with open(os.path.join(out_dir, ".batch_info"), "w") as f:
              f.write(f"total={len(urls)}\n")
              f.write(f"success={len(downloaded)}\n")
              f.write(f"failed={len(failed)}\n")
          
          if failed:
              print("\n❌ Failed URLs:")
              for url in failed:
                  print(f"  - {url}")
          
          EOF
        env:
          PYTHONUNBUFFERED: 1

      - name: Split large files (optional)
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          MAX_MB=${{ github.event.inputs.max_part_mb }}
          
          if [ "$MAX_MB" -gt 0 ]; then
            cd "$OUTPUT_FOLDER"
            for file in *; do
              if [ -f "$file" ] && [ "$file" != ".batch_info" ]; then
                SIZE_MB=$(du -m "$file" | cut -f1)
                if [ "$SIZE_MB" -gt "$MAX_MB" ]; then
                  echo "📦 Splitting $file (${SIZE_MB}MB)"
                  mkdir -p "${file}_parts"
                  split -b "${MAX_MB}M" -d "$file" "${file}_parts/${file}.part."
                  rm "$file"
                fi
              fi
            done
            cd ..
          fi

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_folder }}/"
          
          # Count files
          FILE_COUNT=$(find "${{ github.event.inputs.output_folder }}" -type f ! -name ".batch_info" | wc -l)
          
          git commit -m "📥 Downloaded $FILE_COUNT videos [skip ci]" || echo "Nothing to commit"
          git push

      - name: Final summary
        run: |
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"
          echo "✅ ALL DONE!"
          echo "📁 Files saved in: $OUTPUT_FOLDER"
          echo "📊 Total files: $(find $OUTPUT_FOLDER -type f ! -name '.batch_info' | wc -l)"
          echo "💾 Total size: $(du -sh $OUTPUT_FOLDER | cut -f1)"
