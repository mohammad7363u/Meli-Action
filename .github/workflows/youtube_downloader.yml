name: دانلودر یوتیوب پیشرفته

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '🎥 لینک ویدیو یوتیوب'
        required: true
        type: string
      output_format:
        description: '📦 نوع خروجی'
        required: true
        type: choice
        options:
          - '🎬 ویدیو (MP4)'
          - '🎵 فقط صدا (MP3)'
          - '📹 بهترین کیفیت خودکار'
          - '🎞️ لیست پخش کامل'
        default: '🎬 ویدیو (MP4)'
      quality:
        description: '⚡ کیفیت'
        required: false
        type: string
        default: 'best'
      split_size:
        description: '📊 حداکثر حجم هر بخش (MB) - 0 یعنی تقسیم نشود'
        required: false
        type: number
        default: 2000
      custom_filename:
        description: '📝 نام فایل دلخواه (اختیاری)'
        required: false
        type: string
        default: ''

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
      - name: 📥 دریافت کد
        uses: actions/checkout@v4

      - name: 🛠️ نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg aria2 pv python3-pip
          pip3 install yt-dlp
          
      - name: 🎯 دانلود هوشمند
        id: download
        env:
          URL: ${{ github.event.inputs.video_url }}
        run: |
          # Determine format based on input
          FORMAT_INPUT="${{ github.event.inputs.output_format }}"
          CUSTOM_NAME="${{ github.event.inputs.custom_filename }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          # Set output directory with timestamp
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT_DIR="downloads/${TIMESTAMP}"
          mkdir -p "$OUTPUT_DIR"
          
          # Create download script
          cat > download.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          
          # Format selection logic
          case "$FORMAT_INPUT" in
            *"فقط صدا"*)
              FORMAT="bestaudio/best"
              EXTRACT_AUDIO="--extract-audio --audio-format mp3"
              ;;
            *"بهترین کیفیت"*)
              FORMAT="bestvideo+bestaudio/best"
              MERGE="--merge-output-format mp4"
              ;;
            *"لیست پخش"*)
              FORMAT="best"
              PLAYLIST="--yes-playlist"
              ;;
            *)
              FORMAT="bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]"
              MERGE="--merge-output-format mp4"
              ;;
          esac
          
          # Download with yt-dlp
          yt-dlp \
            --format "$FORMAT" \
            $EXTRACT_AUDIO \
            $MERGE \
            $PLAYLIST \
            --output "$OUTPUT_DIR/%(title)s.%(ext)s" \
            --write-info-json \
            --write-thumbnail \
            --embed-metadata \
            --no-playlist \
            --retries 10 \
            --fragment-retries 10 \
            --concurrent-fragments 8 \
            --downloader aria2c \
            "$URL"
          SCRIPT
          
          chmod +x download.sh
          ./download.sh
          
          # List downloaded files
          echo "downloaded_files<<EOF" >> $GITHUB_OUTPUT
          ls -la "$OUTPUT_DIR" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT

      - name: 📦 فشرده‌سازی و تقسیم فایل‌ها
        run: |
          OUTPUT_DIR="${{ steps.download.outputs.output_dir }}"
          SPLIT_SIZE=${{ github.event.inputs.split_size }}
          
          cd "$OUTPUT_DIR"
          
          # Create checksums
          md5sum * > checksums.md5
          sha256sum * > checksums.sha256
          
          # Split large files
          for file in *.mp4 *.mp3 *.mkv; do
            if [ -f "$file" ]; then
              SIZE_MB=$(du -m "$file" | cut -f1)
              if [ $SPLIT_SIZE -gt 0 ] && [ $SIZE_MB -gt $SPLIT_SIZE ]; then
                echo "✂️ Splitting $file ($SIZE_MB MB)"
                split -b ${SPLIT_SIZE}M -d "$file" "${file}."
                rm "$file"
                # Create reassembly script
                echo "#!/bin/bash" > "reassemble_${file##*/}.sh"
                echo "cat ${file}.?? > '${file##*/}'" >> "reassemble_${file##*/}.sh"
                chmod +x "reassemble_${file##*/}.sh"
              fi
            fi
          done

      - name: 📊 ایجاد گزارش دانلود
        run: |
          OUTPUT_DIR="${{ steps.download.outputs.output_dir }}"
          cat > "$OUTPUT_DIR/README.md" << EOF
          # 📥 گزارش دانلود
          
          **تاریخ:** $(date '+%Y-%m-%d %H:%M:%S')
          **منبع:** ${{ github.event.inputs.video_url }}
          **کیفیت:** ${{ github.event.inputs.quality }}
          
          ## 📁 فایل‌های دانلود شده
          ${{ steps.download.outputs.downloaded_files }}
          
          ## 🔧 نحوه استفاده
          - فایل‌های تقسیم شده را با اسکریپت reassemble ترکیب کنید
          - صحت فایل‌ها را با checksums بررسی کنید
          
          ## ℹ️ اطلاعات فنی
          - ابزار: yt-dlp + aria2
          - سیستم: GitHub Actions
          EOF

      - name: 🚀 آپلود به GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: download-${{ github.run_id }}
          name: '📥 دانلود ${{ github.run_number }}'
          body_path: '${{ steps.download.outputs.output_dir }}/README.md'
          files: |
            ${{ steps.download.outputs.output_dir }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 💾 ذخیره در مخزن
        if: github.event.inputs.split_size > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.download.outputs.output_dir }}/README.md"
          git add "${{ steps.download.outputs.output_dir }}"/*.md5
          git add "${{ steps.download.outputs.output_dir }}"/*.sha256
          git add "${{ steps.download.outputs.output_dir }}"/*.sh
          git commit -m "📥 دانلود: ${{ github.event.inputs.video_url }} [skip ci]" || true
          git push
