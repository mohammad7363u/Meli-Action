name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string
      output_format:
        description: 'Output type'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'
      desired_quality:
        description: 'Quality (video: 144p|360p|480p|720p|1080p|best; audio: 64|128|192|320kbps)'
        required: false
        type: string
        default: '720p'
      max_part_mb:
        description: 'Max part size in MB (0 = no split)'
        required: false
        type: number
        default: 90
      output_folder:
        description: 'Folder for downloaded files'
        required: false
        type: string
        default: 'downloads'

jobs:
  fetch-and-store:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup yt-dlp (with ffmpeg + aria2)
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Download and process video
        run: |
          python3 << 'EOF'
          import os, sys, re, subprocess, time

          URL = "${{ github.event.inputs.video_url }}"
          FMT = "mp3" if "mp3" in "${{ github.event.inputs.output_format }}" else "mp4"
          QUAL = "${{ github.event.inputs.desired_quality }}"
          OUT_DIR = "${{ github.event.inputs.output_folder }}"
          MAX_MB = int("${{ github.event.inputs.max_part_mb }}")

          # Clean URL
          URL = re.sub(r'[?&](si|pp|feature)=[^&]*', '', URL).strip('?&')
          
          # Extract video ID
          v_id = "unknown"
          patterns = [r'youtu\.be/([a-zA-Z0-9_-]{11})', r'v=([a-zA-Z0-9_-]{11})', r'/shorts/([a-zA-Z0-9_-]{11})']
          for p in patterns:
              m = re.search(p, URL)
              if m:
                  v_id = m.group(1)
                  break

          print(f"📋 URL: {URL}")
          print(f"🆔 ID: {v_id}")
          print(f"🎯 Format: {FMT} | Quality: {QUAL}")
          print("=" * 50)

          os.makedirs(OUT_DIR, exist_ok=True)

          # Build yt-dlp command
          output_template = f"{OUT_DIR}/%(title).100s_%(id)s_{QUAL}.%(ext)s"
          
          cmd = ['yt-dlp', '--no-warnings', '--no-playlist', '--embed-metadata']
          
          if FMT == 'mp3':
              cmd.extend([
                  '-x', '--audio-format', 'mp3',
                  '--audio-quality', QUAL.replace('kbps', ''),
                  '--embed-thumbnail'
              ])
          else:
              if QUAL == 'best':
                  cmd.extend(['-f', 'bestvideo+bestaudio/best'])
              else:
                  h = QUAL.replace('p', '')
                  cmd.extend(['-f', f'bestvideo[height<={h}]+bestaudio/best[height<={h}]/best'])
              cmd.extend(['--merge-output-format', 'mp4'])
          
          cmd.extend(['-o', output_template, URL])
          
          print(f"⏳ Downloading...")
          result = subprocess.run(cmd, capture_output=True, text=True, timeout=900)
          
          if result.returncode != 0:
              print(f"❌ Error: {result.stderr[:300]}")
              sys.exit(1)
          
          # Find downloaded file
          downloaded = None
          for f in sorted(os.listdir(OUT_DIR), key=lambda x: os.path.getmtime(os.path.join(OUT_DIR, x)), reverse=True):
              if f.endswith(f'.{FMT}') and not f.startswith('.'):
                  downloaded = os.path.join(OUT_DIR, f)
                  break
          
          if not downloaded:
              print("❌ File not found after download")
              sys.exit(1)
          
          size_mb = os.path.getsize(downloaded) / (1024*1024)
          print(f"✅ Downloaded: {os.path.basename(downloaded)} ({size_mb:.1f} MB)")
          
          # Split if needed
          if MAX_MB > 0 and size_mb > MAX_MB:
              print(f"📦 Splitting ({size_mb:.1f}MB > {MAX_MB}MB)...")
              fname = os.path.basename(downloaded)
              parts_dir = f"{downloaded}_parts"
              os.makedirs(parts_dir, exist_ok=True)
              
              part_size = MAX_MB * 1024 * 1024
              with open(downloaded, 'rb') as src:
                  part_num = 0
                  while True:
                      chunk = src.read(part_size)
                      if not chunk:
                          break
                      part_path = os.path.join(parts_dir, f"{fname}.part{part_num:03d}")
                      with open(part_path, 'wb') as dst:
                          dst.write(chunk)
                      part_num += 1
              
              print(f"  ✅ Split into {part_num} parts in: {parts_dir}/")
              # Create merge script
              script_path = f"{downloaded}.merge.sh"
              with open(script_path, 'w') as sf:
                  sf.write(f"#!/bin/bash\n# Merge parts: cat {parts_dir}/{fname}.part* > {fname}\n")
                  sf.write(f"cat \"{parts_dir}/{fname}.part\"* > \"{fname}\"\n")
                  sf.write(f"echo '✅ Merged: {fname}'\n")
              os.chmod(script_path, 0o755)
              print(f"  📜 Merge script: {os.path.basename(script_path)}")
              os.remove(downloaded)
          
          print("\n✅ ALL DONE!")
          EOF
        env:
          PYTHONUNBUFFERED: 1

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_folder }}/"
          
          FILE_COUNT=$(find "${{ github.event.inputs.output_folder }}" -type f | wc -l)
          git commit -m "📥 Downloaded YouTube video ($FILE_COUNT file(s)) [skip ci]" || echo "Nothing to commit"
          git push
