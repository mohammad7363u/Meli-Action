name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'لینک‌های یوتیوب (با کاما جدا کنید)'
        required: true
        type: string
      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - 'ویدیو (MP4)'
          - 'فقط صدا (MP3)'
        default: 'ویدیو (MP4)'
      quality:
        description: 'کیفیت'
        required: false
        type: string
        default: '720p'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4

      - name: نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg zip
          pip3 install yt-dlp

      - name: دانلود و زیپ
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT_DIR="downloads/${TIMESTAMP}"
          mkdir -p "$OUTPUT_DIR"
          
          # تعیین فرمت
          if [[ "${{ github.event.inputs.output_format }}" == *"MP3"* ]]; then
            FORMAT="bestaudio/best"
            ARGS="--extract-audio --audio-format mp3 --audio-quality 0"
          else
            QUAL="${{ github.event.inputs.quality }}"
            QUAL_NUM=$(echo "$QUAL" | grep -o '[0-9]*')
            FORMAT="bestvideo[height<=${QUAL_NUM}]+bestaudio/best[height<=${QUAL_NUM}]/best"
            ARGS="--merge-output-format mp4"
          fi
          
          # دانلود هر لینک
          IFS=',' read -ra URLS <<< "${{ github.event.inputs.video_urls }}"
          COUNT=0
          
          for url in "${URLS[@]}"; do
            CLEAN_URL=$(echo "$url" | sed 's/[[:space:]]*//g' | sed 's/?si=.*$//')
            if [ -n "$CLEAN_URL" ]; then
              COUNT=$((COUNT + 1))
              echo "دانلود $COUNT: $CLEAN_URL"
              yt-dlp -f "$FORMAT" $ARGS -o "$OUTPUT_DIR/%(title)s.%(ext)s" --no-playlist "$CLEAN_URL" || echo "خطا در دانلود $CLEAN_URL"
            fi
          done
          
          echo ""
          echo "دانلود $COUNT فایل تموم شد"
          echo ""
          echo "فایل‌های دانلود شده:"
          ls -lah "$OUTPUT_DIR/"
          
          # بررسی وجود فایل
          FILE_COUNT=$(ls "$OUTPUT_DIR" | wc -l)
          echo "تعداد فایل‌ها: $FILE_COUNT"
          
          if [ $FILE_COUNT -gt 0 ]; then
            # رفتن به پوشه اصلی downloads
            cd downloads
            
            ZIP_NAME="youtube_${TIMESTAMP}.zip"
            
            # زیپ کردن پوشه حاوی فایل‌ها
            zip -r "$ZIP_NAME" "${TIMESTAMP}/"
            
            echo ""
            echo "فایل زیپ ساخته شد:"
            ls -lah "$ZIP_NAME"
            
            # نمایش محتویات زیپ
            echo ""
            echo "محتویات فایل زیپ:"
            unzip -l "$ZIP_NAME"
          else
            echo "هیچ فایلی برای زیپ وجود ندارد!"
            exit 1
          fi

      - name: ذخیره در پروژه
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add downloads/
          git commit -m "دانلود جدید [skip ci]" || echo "چیزی برای commit نیست"
          git push
