name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'لینک‌های یوتیوب (با کاما جدا کنید)'
        required: true
        type: string
      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - 'ویدیو (MP4)'
          - 'فقط صدا (MP3)'
        default: 'ویدیو (MP4)'
      quality:
        description: 'کیفیت'
        required: false
        type: string
        default: '720p'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: دریافت کد
        uses: actions/checkout@v4

      - name: نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg zip
          pip3 install yt-dlp

      - name: دانلود فایل‌ها
        run: |
          mkdir -p downloads
          
          if [[ "${{ github.event.inputs.output_format }}" == *"MP3"* ]]; then
            FORMAT="bestaudio/best"
            ARGS="--extract-audio --audio-format mp3 --audio-quality 0"
          else
            QUAL="${{ github.event.inputs.quality }}"
            QUAL_NUM=$(echo "$QUAL" | grep -o '[0-9]*')
            if [ -z "$QUAL_NUM" ]; then QUAL_NUM="720"; fi
            FORMAT="bestvideo[height<=${QUAL_NUM}]+bestaudio/best[height<=${QUAL_NUM}]/best"
            ARGS="--merge-output-format mp4"
          fi
          
          IFS=',' read -ra URLS <<< "${{ github.event.inputs.video_urls }}"
          
          for url in "${URLS[@]}"; do
            CLEAN_URL=$(echo "$url" | sed 's/[[:space:]]*//g' | sed 's/?si=.*$//')
            if [ -n "$CLEAN_URL" ]; then
              echo "در حال دانلود: $CLEAN_URL"
              yt-dlp \
                -f "$FORMAT" \
                $ARGS \
                -o "downloads/%(title)s.%(ext)s" \
                --no-playlist \
                --retries 5 \
                --user-agent "Mozilla/5.0" \
                "$CLEAN_URL" || echo "خطا: $CLEAN_URL"
            fi
          done
          
          echo ""
          echo "فایل‌های دانلود شده:"
          ls -lah downloads/

      - name: زیپ کردن
        run: |
          if ls downloads/*.mp4 downloads/*.mp3 1>/dev/null 2>&1; then
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            cd downloads
            ZIP_NAME="youtube_${TIMESTAMP}.zip"
            zip "$ZIP_NAME" *.mp4 *.mp3 *.webm *.mkv 2>/dev/null
            echo "زیپ ساخته شد: $ZIP_NAME"
            ls -lah "$ZIP_NAME"
          else
            echo "فایلی برای زیپ پیدا نشد"
          fi

      - name: ذخیره در پروژه
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add downloads/
          git commit -m "دانلود [skip ci]" || echo "بدون تغییر"
          git push
